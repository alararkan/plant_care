<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Planties">
<meta name="theme-color" content="#1B4332">
<title>Planties — Bremen</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --green:#2D6A4F; --green-dark:#1B4332; --green-light:#D8F3DC; --green-mid:#95D5B2;
  --cream:#F7F3EC; --cream-dark:#E8E0D0; --text:#1C1C18; --text-muted:#6B6B60;
  --text-light:#9A9A8A; --card:#FFFFFF;
  --warn:#FFF3CD; --warn-b:#D4A017; --warn-t:#5C3D00;
  --danger:#FFEBEB; --danger-b:#D44; --danger-t:#6B0000;
  --info:#EBF4FF; --info-b:#5B9BD5; --info-t:#1A3A5C;
  --ok:#EBFAF0; --ok-b:#3D9970; --ok-t:#0D3D22;
  --safe-top:env(safe-area-inset-top); --safe-bot:env(safe-area-inset-bottom);
}
html { height:100%; background:var(--green-dark); }
body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--text); min-height:100dvh; overflow-x:hidden; }

.header { background:var(--green-dark); padding:calc(var(--safe-top) + 16px) 20px 24px; position:relative; overflow:hidden; }
.header::after { content:''; position:absolute; bottom:-50px; right:-30px; width:160px; height:160px; border-radius:50%; background:rgba(149,213,178,0.08); pointer-events:none; }
.header-eyebrow { font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--green-mid); margin-bottom:6px; }
.header-title { font-family:'Lora',serif; font-size:28px; font-weight:400; color:#fff; line-height:1.1; margin-bottom:4px; }
.header-sub { font-size:13px; color:var(--green-mid); opacity:0.75; }

.body { padding:20px 16px calc(var(--safe-bot) + 24px); max-width:500px; margin:0 auto; }

.weather-card { background:var(--card); border-radius:20px; padding:18px; margin-bottom:20px; box-shadow:0 2px 16px rgba(0,0,0,0.06); }
.weather-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; }
.weather-desc { font-family:'Lora',serif; font-size:22px; color:var(--text); line-height:1.2; }
.weather-time { font-size:11px; color:var(--text-light); margin-top:3px; }
.refresh-btn { background:var(--green-light); border:none; border-radius:10px; width:38px; height:38px; font-size:18px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:transform 0.2s; }
.refresh-btn:active { transform:scale(0.9); }
.refresh-btn.spinning { animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.metrics { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:16px; }
.metric { background:var(--cream); border-radius:12px; padding:10px 6px; text-align:center; }
.metric-val { font-size:16px; font-weight:500; color:var(--text); line-height:1; white-space:nowrap; }
.metric-lbl { font-size:9px; color:var(--text-light); margin-top:4px; text-transform:uppercase; letter-spacing:0.05em; }
.section-label { font-size:10px; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-muted); margin-bottom:10px; }
.forecast-row { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.forecast-day { background:var(--cream); border-radius:12px; padding:10px 8px; text-align:center; }
.fc-day { font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.06em; }
.fc-icon { font-size:18px; margin:4px 0; }
.fc-temp { font-size:13px; font-weight:500; color:var(--text); }
.fc-rain { font-size:11px; color:var(--info-b); margin-top:2px; }
.divider { height:1px; background:var(--cream-dark); margin:16px 0; }

.alerts-wrap { margin-bottom:20px; }
.alert { border-radius:14px; padding:13px 14px; margin-bottom:10px; border-left:3px solid; display:flex; gap:11px; animation:fadeUp 0.3s ease both; }
@keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
.alert-warn   { background:var(--warn);   border-color:var(--warn-b); }
.alert-danger { background:var(--danger); border-color:var(--danger-b); }
.alert-info   { background:var(--info);   border-color:var(--info-b); }
.alert-ok     { background:var(--ok);     border-color:var(--ok-b); }
.alert-icon { font-size:20px; flex-shrink:0; line-height:1.3; }
.alert-msg { font-size:14px; line-height:1.55; }
.alert-warn .alert-msg   { color:var(--warn-t); }
.alert-danger .alert-msg { color:var(--danger-t); }
.alert-info .alert-msg   { color:var(--info-t); }
.alert-ok .alert-msg     { color:var(--ok-t); }
.alert-plants { font-size:11px; margin-top:4px; opacity:0.65; }
.alert-warn .alert-plants   { color:var(--warn-t); }
.alert-danger .alert-plants { color:var(--danger-t); }
.alert-info .alert-plants   { color:var(--info-t); }
.alert-ok .alert-plants     { color:var(--ok-t); }

/* PLANT GRID */
.plant-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.plant-card { background:var(--card); border-radius:16px; padding:14px; box-shadow:0 1px 8px rgba(0,0,0,0.05); cursor:pointer; transition:transform 0.15s,box-shadow 0.15s; -webkit-user-select:none; position:relative; }
.plant-card:active { transform:scale(0.97); }
.plant-name { font-family:'Lora',serif; font-size:14px; font-weight:500; color:var(--text); line-height:1.3; margin-bottom:2px; }
.plant-latin { font-size:11px; color:var(--text-light); font-style:italic; margin-bottom:8px; line-height:1.3; }
.plant-footer { display:flex; align-items:center; justify-content:space-between; margin-top:6px; }
.plant-badge { display:inline-block; font-size:10px; padding:3px 8px; border-radius:20px; font-weight:500; }
.badge-balcony  { background:#D8F3DC; color:#1B4332; }
.badge-living   { background:#EEF2FF; color:#2D3A8C; }
.badge-office   { background:#FFF7ED; color:#7C3A00; }
.badge-kitchen  { background:#FEF9C3; color:#6B5200; }
.badge-bathroom { background:#F0F9FF; color:#0C4A6E; }

/* WATER STATUS DOT */
.water-status { display:flex; align-items:center; gap:5px; margin-bottom:6px; }
.status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.dot-ok     { background:#3D9970; }
.dot-soon   { background:#D4A017; }
.dot-due    { background:#D44; }
.dot-never  { background:#ccc; }
.status-text { font-size:11px; color:var(--text-muted); }

/* WATER BUTTON ON CARD */
.water-btn-small { background:var(--green-light); border:none; border-radius:8px; padding:4px 8px; font-size:11px; color:var(--green-dark); cursor:pointer; font-family:'DM Sans',sans-serif; font-weight:500; flex-shrink:0; }
.water-btn-small:active { transform:scale(0.95); }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:100; display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:opacity 0.25s ease; -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px); }
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal { background:var(--cream); border-radius:24px 24px 0 0; width:100%; max-height:88dvh; overflow-y:auto; transform:translateY(100%); transition:transform 0.3s cubic-bezier(0.32,0.72,0,1); padding-bottom:calc(var(--safe-bot) + 24px); -webkit-overflow-scrolling:touch; }
.modal-overlay.open .modal { transform:translateY(0); }
.modal-handle { width:36px; height:4px; background:var(--cream-dark); border-radius:2px; margin:12px auto 0; }
.modal-img { width:100%; height:240px; object-fit:contain; background:#fff; display:block; margin-top:12px; }
.modal-body { padding:20px 20px 8px; }
.modal-name { font-family:'Lora',serif; font-size:26px; font-weight:500; color:var(--text); margin-bottom:3px; }
.modal-latin { font-size:14px; font-style:italic; color:var(--text-muted); margin-bottom:8px; }
.modal-loc { margin-bottom:4px; }
.modal-section { font-size:10px; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-muted); margin:20px 0 10px; }
.needs-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.need-card { background:#fff; border-radius:14px; padding:12px 14px; }
.need-icon { font-size:20px; margin-bottom:6px; }
.need-label { font-size:10px; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-muted); margin-bottom:3px; }
.need-value { font-size:14px; font-weight:500; color:var(--text); line-height:1.3; }
.watering-card { background:#fff; border-radius:14px; padding:14px; margin-top:8px; }
.watering-text { font-size:14px; line-height:1.6; color:var(--text); }
.seasonal-list { background:#fff; border-radius:14px; padding:14px; margin-top:8px; }
.season-row { display:flex; gap:10px; padding:7px 0; border-bottom:1px solid var(--cream); font-size:13px; line-height:1.4; }
.season-row:last-child { border-bottom:none; padding-bottom:0; }
.season-name { font-weight:500; color:var(--green-dark); min-width:60px; flex-shrink:0; }
.season-info { color:var(--text-muted); }

/* WATERING LOG IN MODAL */
.water-log-card { background:#fff; border-radius:14px; padding:14px; margin-top:8px; }
.water-log-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.water-log-status { font-size:14px; color:var(--text); }
.water-btn-main { background:var(--green); border:none; border-radius:10px; padding:10px 20px; font-size:14px; font-weight:500; color:#fff; cursor:pointer; font-family:'DM Sans',sans-serif; transition:background 0.15s; }
.water-btn-main:active { background:var(--green-dark); transform:scale(0.97); }
.water-history { margin-top:12px; border-top:1px solid var(--cream); padding-top:12px; }
.history-title { font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-light); margin-bottom:8px; }
.history-item { font-size:13px; color:var(--text-muted); padding:4px 0; border-bottom:1px solid var(--cream); }
.history-item:last-child { border-bottom:none; }

.loading { font-size:14px; color:var(--text-muted); padding:12px 0; font-style:italic; }
.error-box { background:var(--danger); border-left:3px solid var(--danger-b); border-radius:14px; padding:13px 14px; font-size:14px; color:var(--danger-t); }
footer { text-align:center; font-size:11px; color:var(--text-light); margin-top:8px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">🌿 Plant Care</div>
  <div class="header-title">Planties</div>
  <div class="header-sub">Bremen · 20 plants</div>
</div>

<div class="body">
  <div class="weather-card">
    <div class="weather-top">
      <div><div class="weather-desc" id="wdesc">Loading...</div><div class="weather-time" id="wtime"></div></div>
      <button class="refresh-btn" id="refreshBtn" onclick="loadAll()">↻</button>

    <div class="forecast-row" id="forecast"><div class="loading">Loading...</div></div>
  </div>
  <div class="section-label">Plant alerts today</div>
  <div class="alerts-wrap" id="alerts"><div class="loading">Checking conditions...</div></div>
  <div class="section-label">Your plants</div>
  <div class="plant-grid" id="plantgrid"></div>
  <footer>Weather: Open-Meteo · Bremen 53.08°N 8.80°E</footer>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <img class="modal-img" id="modal-img" src="" alt="">
    <div class="modal-body">
      <div class="modal-name" id="modal-name"></div>
      <div class="modal-latin" id="modal-latin"></div>
      <div class="modal-loc" id="modal-loc"></div>
      <div class="modal-section">Watering log</div>
      <div class="water-log-card">
        <div class="water-log-header">
          <div class="water-log-status" id="modal-water-status">Loading...</div>
          <button class="water-btn-main" id="modal-water-btn" onclick="logWatering()">💧 Water now</button>
        </div>
        <div class="water-history" id="modal-water-history"></div>
      </div>
      <div class="modal-section">Repotting log</div>
      <div class="water-log-card">
        <div class="water-log-header">
          <div class="water-log-status" id="modal-repot-status">Never repotted</div>
          <button class="water-btn-main" style="background:#7C3A00;" onclick="logRepotting()">🪴 Repotted</button>
        </div>
        <div class="water-history" id="modal-repot-history"></div>
      </div>
      <div class="modal-section">Basic needs</div>
      <div class="needs-grid" id="modal-needs"></div>
      <div class="modal-section">Watering</div>
      <div class="watering-card"><div class="watering-text" id="modal-watering"></div></div>
      <div class="modal-section">Seasonal care</div>
      <div class="seasonal-list" id="modal-seasonal"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC1LU51dGu9JfGb79-iM0gAyz_UVHmPHY0",
  authDomain: "plant-care-cec8f.firebaseapp.com",
  databaseURL: "https://plant-care-cec8f-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "plant-care-cec8f",
  storageBucket: "plant-care-cec8f.firebasestorage.app",
  messagingSenderId: "476726492270",
  appId: "1:476726492270:web:ac3f3eeffb774db5e5ba7f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window._db = db;
window._ref = ref;
window._set = set;
window._get = get;
window._push = push;
window._onValue = onValue;

// Load all watering data and render cards
onValue(ref(db, 'watering'), (snapshot) => {
  window._wateringData = snapshot.val() || {};
  renderPlantGrid();
  if (window._currentPlantKey) updateModalWaterLog(window._currentPlantKey);
});
</script>

function getWaterStatus(key, waterDays) {
  const data = window._wateringData;
  if (!data || !data[key]) return { label:'Never watered', dot:'dot-never', next:null };
  const entries = Object.values(data[key]);
  const latest = entries.sort((a,b) => b.ts - a.ts)[0];

  // Compare calendar days, not hours
  const today = new Date(); today.setHours(0,0,0,0);
  const wateredDay = new Date(latest.ts); wateredDay.setHours(0,0,0,0);
  const daysAgo = Math.round((today - wateredDay) / 86400000);

  // Next watering date
  const nextDate = new Date(wateredDay);
  nextDate.setDate(nextDate.getDate() + waterDays);
  const daysUntil = Math.round((nextDate - today) / 86400000);
  const nextStr = nextDate.toLocaleDateString('en-GB', {day:'numeric', month:'long'});
  const nextLabel = daysUntil <= 0 ? `Next watering: today (${nextStr})` :
                    daysUntil === 1 ? `Next watering: tomorrow (${nextStr})` :
                    `Next watering: in ${daysUntil} days (${nextStr})`;

  if (daysAgo === 0) return { label:'Watered today', dot:'dot-ok', next:nextLabel };
  if (daysAgo === 1) return { label:'Watered yesterday', dot:'dot-ok', next:nextLabel };
  if (daysAgo < waterDays) return { label:`Watered ${daysAgo} days ago`, dot:'dot-ok', next:nextLabel };
  if (daysAgo === waterDays) return { label:`Due today!`, dot:'dot-soon', next:nextLabel };
  return { label:`Overdue by ${daysAgo - waterDays} day${daysAgo - waterDays > 1 ? 's' : ''}!`, dot:'dot-due', next:nextLabel };
}

function renderPlantGrid() {
  document.getElementById('plantgrid').innerHTML = plants.map(p => {
    const status = getWaterStatus(p.key, p.waterDays);
    return `<div class="plant-card" onclick="openPlant('${p.key}')">
      <div class="plant-name">${p.name}</div>
      <div class="plant-latin">${p.latin}</div>
      <div class="water-status">
        <div class="status-dot ${status.dot}"></div>
        <span class="status-text">${status.label}</span>
      </div>
      ${status.next ? `<div style="font-size:10px;color:var(--text-light);margin-bottom:6px;">🗓 ${status.next}</div>` : ''}
      <div class="plant-footer">
        <span class="plant-badge badge-${p.badge}">${p.loc}</span>
        <button class="water-btn-small" onclick="event.stopPropagation(); quickWater('${p.key}')">💧 Water</button>
      </div>
    </div>`;
  }).join('');

  // Check for overdue plants and add alert
  const overdue = plants.filter(p => {
    const s = getWaterStatus(p.key, p.waterDays);
    return s.dot === 'dot-due';
  }).map(p => p.name);
  if (overdue.length > 0) {
    const existing = document.getElementById('watering-alert');
    if (!existing) {
      const alertDiv = document.createElement('div');
      alertDiv.id = 'watering-alert';
      alertDiv.className = 'alert alert-danger';
      alertDiv.style.animationDelay = '0s';
      alertDiv.innerHTML = `<span class="alert-icon">💧</span><div><div class="alert-msg">These plants need watering!</div><div class="alert-plants">${overdue.join(', ')}</div></div>`;
      document.getElementById('alerts').prepend(alertDiv);
    }
  }
}

function quickWater(key) {
  if (!window._db) return;
  const ts = Date.now();
  window._push(window._ref(window._db, `watering/${key}`), { ts, date: new Date().toLocaleDateString('en-GB') });
}

function logWatering() {
  if (!window._currentPlantKey || !window._db) return;
  quickWater(window._currentPlantKey);
}

function logRepotting() {
  if (!window._currentPlantKey || !window._db) return;
  const ts = Date.now();
  window._push(window._ref(window._db, `repotting/${window._currentPlantKey}`), { ts, date: new Date().toLocaleDateString('en-GB', {day:'numeric', month:'long', year:'numeric'}) });
}

function updateModalWaterLog(key) {
  const p = plants.find(x => x.key === key);
  if (!p) return;
  const status = getWaterStatus(key, p.waterDays);
  document.getElementById('modal-water-status').innerHTML = `<span class="status-dot ${status.dot}" style="display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle;"></span>${status.label}${status.next ? `<br><span style="font-size:12px;color:var(--text-light);">🗓 ${status.next}</span>` : ''}`;
  const data = window._wateringData;
  if (data && data[key]) {
    const entries = Object.values(data[key]).sort((a,b) => b.ts - a.ts).slice(0, 5);
    document.getElementById('modal-water-history').innerHTML = `
      <div class="history-title">Recent waterings</div>
      ${entries.map(e => `<div class="history-item">💧 ${e.date || new Date(e.ts).toLocaleDateString('en-GB')}</div>`).join('')}`;
  } else {
    document.getElementById('modal-water-history').innerHTML = `<div class="history-title">No waterings logged yet</div>`;
  }
  // Repotting log
  const repotData = window._wateringData && window._wateringData['_repot_' + key] ? window._wateringData['_repot_' + key] : null;
  window._onValue(window._ref(window._db, `repotting/${key}`), (snap) => {
    const rd = snap.val();
    if (rd) {
      const repotEntries = Object.values(rd).sort((a,b) => b.ts - a.ts);
      const latest = repotEntries[0];
      document.getElementById('modal-repot-status').textContent = `Last repotted: ${latest.date}`;
      document.getElementById('modal-repot-history').innerHTML = `
        <div class="history-title">Repotting history</div>
        ${repotEntries.slice(0,5).map(e => `<div class="history-item">🪴 ${e.date}</div>`).join('')}`;
    } else {
      document.getElementById('modal-repot-status').textContent = 'Never repotted';
      document.getElementById('modal-repot-history').innerHTML = `<div class="history-title">No repottings logged yet</div>`;
    }
  });
}

function openPlant(key) {
  const p = plants.find(x => x.key === key);
  if (!p) return;
  window._currentPlantKey = key;
  const imgEl = document.getElementById('modal-img');
  imgEl.src = `images/${p.key}.png`;
  imgEl.onerror = () => { imgEl.src = `images/${p.key}.jpg`; };
  document.getElementById('modal-img').alt = p.name;
  document.getElementById('modal-name').textContent = p.name;
  document.getElementById('modal-latin').textContent = p.latin;
  document.getElementById('modal-loc').innerHTML = `<span class="plant-badge badge-${p.badge}">${p.loc}</span>`;
  document.getElementById('modal-needs').innerHTML = p.needs.map(n => `<div class="need-card"><div class="need-icon">${n.icon}</div><div class="need-label">${n.label}</div><div class="need-value">${n.value}</div></div>`).join('');
  document.getElementById('modal-watering').textContent = p.watering;
  document.getElementById('modal-seasonal').innerHTML = p.seasonal.map(s => `<div class="season-row"><div class="season-name">${s.s}</div><div class="season-info">${s.t}</div></div>`).join('');
  updateModalWaterLog(key);
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
  window._currentPlantKey = null;
}

let startY = 0;
document.getElementById('modal').addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, {passive:true});
document.getElementById('modal').addEventListener('touchmove', e => {
  if (e.touches[0].clientY - startY > 80 && document.getElementById('modal').scrollTop === 0) {
    document.getElementById('overlay').classList.remove('open');
    document.body.style.overflow = '';
    window._currentPlantKey = null;
  }
}, {passive:true});

async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  try {
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=53.0793&longitude=8.8017&current=temperature_2m,apparent_temperature,relative_humidity_2m,precipitation,wind_speed_10m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum&wind_speed_unit=kmh&timezone=Europe/Berlin&forecast_days=4');
    const d = await r.json(); const c = d.current;
    document.getElementById('wdesc').textContent = WMO[c.weather_code] || 'Mixed';
    document.getElementById('wtime').textContent = 'Updated ' + new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
    document.getElementById('metrics').innerHTML = [
      {v:Math.round(c.temperature_2m)+'°',l:'Temp'},
      {v:Math.round(c.apparent_temperature)+'°',l:'Feels'},
      {v:Math.round(c.relative_humidity_2m)+'%',l:'Humid'},
      {v:c.precipitation.toFixed(1)+'mm',l:'Rain'},
      {v:Math.round(c.wind_speed_10m)+' km/h',l:'Wind'},
    ].map(m => `<div class="metric"><div class="metric-val">${m.v}</div><div class="metric-lbl">${m.l}</div></div>`).join('');
    const fc = d.daily;
    document.getElementById('forecast').innerHTML = fc.time.slice(1,4).map((t,i) => {
      const day = new Date(t); const code = fc.weather_code[i+1];
      return `<div class="forecast-day"><div class="fc-day">${DAYS[day.getDay()]}</div><div class="fc-icon">${WIC[code]||'🌤'}</div><div class="fc-temp">${Math.round(fc.temperature_2m_max[i+1])}° / ${Math.round(fc.temperature_2m_min[i+1])}°</div><div class="fc-rain">${fc.precipitation_sum[i+1].toFixed(1)} mm</div></div>`;
    }).join('');
    const w = {temp:c.temperature_2m,feels:c.apparent_temperature,humidity:c.relative_humidity_2m,rain:c.precipitation,wind:c.wind_speed_10m};
    const m2 = new Date().getMonth()+1;
    const balcony = plants.filter(p=>p.badge==='balcony').map(p=>p.name);
    const frostSens = plants.filter(p=>p.frost&&p.badge==='balcony').map(p=>p.name);
    const weatherAlerts = [];
    if(w.feels<=2&&m2>=3&&m2<=5) weatherAlerts.push({t:'danger',i:'❄️',msg:`Late frost risk! Cover your Japanese Maple and bring Cherry Tomato & Basil inside.`,pl:frostSens.join(', ')});
    else if(w.feels<=2) weatherAlerts.push({t:'danger',i:'❄️',msg:`Near freezing (feels ${Math.round(w.feels)}°C). Bring frost-sensitive balcony plants indoors.`,pl:frostSens.join(', ')});
    if(w.temp>28) weatherAlerts.push({t:'warn',i:'☀️',msg:`Hot day (${Math.round(w.temp)}°C) — water balcony plants morning and evening.`,pl:balcony.join(', ')});
    if(w.wind>35) weatherAlerts.push({t:'warn',i:'💨',msg:`Strong winds (${Math.round(w.wind)} km/h) — shelter Japanese Maple and Cherry Tomato.`,pl:'Japanese Maple, Cherry Tomato, Basil'});
    else if(w.wind>22) weatherAlerts.push({t:'info',i:'💨',msg:`Breezy (${Math.round(w.wind)} km/h) — keep an eye on the Japanese Maple.`,pl:'Japanese Maple'});
    if(w.rain>5) weatherAlerts.push({t:'ok',i:'🌧',msg:`Good rain (${w.rain.toFixed(1)} mm) — balcony plants covered. Empty saucers when it stops.`,pl:balcony.join(', ')});
    else if(w.rain===0&&w.humidity<40) weatherAlerts.push({t:'warn',i:'💧',msg:`Very dry — water all balcony plants today.`,pl:'All balcony plants'});
    else if(w.rain===0&&w.humidity<55) weatherAlerts.push({t:'info',i:'💧',msg:`No rain — check balcony soil and water if top 2 cm feels dry.`,pl:'Japanese Maple, Strawberry, Cherry Tomato'});
    if(w.humidity>80) weatherAlerts.push({t:'ok',i:'🌿',msg:`High humidity — Fern, Pothos and Monstera will love it. No need to mist.`,pl:'Fern, Pothos, Monstera'});
    if(w.temp>=15&&w.temp<=25&&w.rain<2&&w.wind<20&&m2>=4&&m2<=9) weatherAlerts.push({t:'ok',i:'🌱',msg:`Perfect growing weather today!`,pl:'All plants'});
    if(weatherAlerts.length===0) weatherAlerts.push({t:'ok',i:'✓',msg:`All conditions normal — no special action needed today.`,pl:'All plants'});
    document.getElementById('alerts').innerHTML = weatherAlerts.map((a,i) => `<div class="alert alert-${a.t}" style="animation-delay:${i*0.06}s"><span class="alert-icon">${a.i}</span><div><div class="alert-msg">${a.msg}</div><div class="alert-plants">${a.pl}</div></div></div>`).join('');
    renderPlantGrid();
  } catch(e) {
    document.getElementById('wdesc').textContent = 'Error';
    document.getElementById('alerts').innerHTML = `<div class="error-box">Could not load weather. Tap ↻ to retry.</div>`;
  }
  btn.classList.remove('spinning');
}

renderPlantGrid();
loadAll();
</script>
