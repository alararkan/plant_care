<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Plants">
<meta name="theme-color" content="#1B4332">
<title>My Plants — Bremen</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --green:       #2D6A4F;
  --green-dark:  #1B4332;
  --green-light: #D8F3DC;
  --green-mid:   #95D5B2;
  --cream:       #F7F3EC;
  --cream-dark:  #E8E0D0;
  --text:        #1C1C18;
  --text-muted:  #6B6B60;
  --text-light:  #9A9A8A;
  --card:        #FFFFFF;
  --warn:        #FFF3CD;
  --warn-b:      #D4A017;
  --warn-t:      #5C3D00;
  --danger:      #FFEBEB;
  --danger-b:    #D44;
  --danger-t:    #6B0000;
  --info:        #EBF4FF;
  --info-b:      #5B9BD5;
  --info-t:      #1A3A5C;
  --ok:          #EBFAF0;
  --ok-b:        #3D9970;
  --ok-t:        #0D3D22;
  --safe-top: env(safe-area-inset-top);
  --safe-bot: env(safe-area-inset-bottom);
}

html { height: 100%; background: var(--green-dark); }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--text);
  min-height: 100%;
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ── HEADER ── */
.header {
  background: var(--green-dark);
  padding: calc(var(--safe-top) + 16px) 20px 24px;
  position: relative;
  overflow: hidden;
}

.header::after {
  content: '';
  position: absolute;
  bottom: -50px; right: -30px;
  width: 160px; height: 160px;
  border-radius: 50%;
  background: rgba(149,213,178,0.08);
  pointer-events: none;
}

.header-eyebrow {
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--green-mid);
  margin-bottom: 6px;
}

.header-title {
  font-family: 'Lora', serif;
  font-size: 28px;
  font-weight: 400;
  color: #fff;
  line-height: 1.1;
  margin-bottom: 4px;
}

.header-sub {
  font-size: 13px;
  color: var(--green-mid);
  opacity: 0.75;
}

/* ── SCROLL BODY ── */
.body {
  padding: 20px 16px calc(var(--safe-bot) + 24px);
  max-width: 500px;
  margin: 0 auto;
}

/* ── WEATHER CARD ── */
.weather-card {
  background: var(--card);
  border-radius: 20px;
  padding: 18px;
  margin-bottom: 20px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.06);
}

.weather-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 16px;
}

.weather-desc {
  font-family: 'Lora', serif;
  font-size: 22px;
  color: var(--text);
  line-height: 1.2;
}

.weather-time {
  font-size: 11px;
  color: var(--text-light);
  margin-top: 3px;
}

.refresh-btn {
  background: var(--green-light);
  border: none;
  border-radius: 10px;
  width: 38px; height: 38px;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s;
  -webkit-appearance: none;
}
.refresh-btn:active { transform: scale(0.9); }
.refresh-btn.spinning { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.metrics {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}

.metric {
  background: var(--cream);
  border-radius: 12px;
  padding: 10px 6px;
  text-align: center;
}

.metric-val {
  font-size: 16px;
  font-weight: 500;
  color: var(--text);
  line-height: 1;
  white-space: nowrap;
}

.metric-lbl {
  font-size: 9px;
  color: var(--text-light);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* ── FORECAST ── */
.section-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
}

.forecast-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.forecast-day {
  background: var(--cream);
  border-radius: 12px;
  padding: 10px 8px;
  text-align: center;
}

.fc-day { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
.fc-icon { font-size: 18px; margin: 4px 0; }
.fc-temp { font-size: 13px; font-weight: 500; color: var(--text); }
.fc-rain { font-size: 11px; color: var(--info-b); margin-top: 2px; }

/* ── ALERTS ── */
.alerts-wrap { margin-bottom: 20px; }

.alert {
  border-radius: 14px;
  padding: 13px 14px;
  margin-bottom: 10px;
  border-left: 3px solid;
  display: flex;
  gap: 11px;
  animation: fadeUp 0.3s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: none; }
}

.alert-warn   { background: var(--warn);   border-color: var(--warn-b); }
.alert-danger { background: var(--danger); border-color: var(--danger-b); }
.alert-info   { background: var(--info);   border-color: var(--info-b); }
.alert-ok     { background: var(--ok);     border-color: var(--ok-b); }

.alert-icon { font-size: 20px; flex-shrink: 0; line-height: 1.3; }

.alert-msg {
  font-size: 14px;
  line-height: 1.55;
}

.alert-warn   .alert-msg { color: var(--warn-t); }
.alert-danger .alert-msg { color: var(--danger-t); }
.alert-info   .alert-msg { color: var(--info-t); }
.alert-ok     .alert-msg { color: var(--ok-t); }

.alert-plants {
  font-size: 11px;
  margin-top: 4px;
  opacity: 0.65;
}
.alert-warn   .alert-plants { color: var(--warn-t); }
.alert-danger .alert-plants { color: var(--danger-t); }
.alert-info   .alert-plants { color: var(--info-t); }
.alert-ok     .alert-plants { color: var(--ok-t); }

/* ── PLANT LIST ── */
.plant-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.plant-card {
  background: var(--card);
  border-radius: 16px;
  padding: 14px;
  box-shadow: 0 1px 8px rgba(0,0,0,0.05);
}

.plant-name {
  font-family: 'Lora', serif;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 3px;
}

.plant-loc {
  font-size: 11px;
  color: var(--text-light);
  margin-bottom: 8px;
}

.plant-badge {
  display: inline-block;
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 20px;
  font-weight: 500;
  letter-spacing: 0.03em;
}

.badge-balcony  { background: #D8F3DC; color: #1B4332; }
.badge-living   { background: #EEF2FF; color: #2D3A8C; }
.badge-office   { background: #FFF7ED; color: #7C3A00; }
.badge-kitchen  { background: #FEF9C3; color: #6B5200; }
.badge-bathroom { background: #F0F9FF; color: #0C4A6E; }

/* ── LOADING / ERROR ── */
.loading {
  font-size: 14px;
  color: var(--text-muted);
  padding: 12px 0;
  font-style: italic;
}

.error-box {
  background: var(--danger);
  border-left: 3px solid var(--danger-b);
  border-radius: 14px;
  padding: 13px 14px;
  font-size: 14px;
  color: var(--danger-t);
}

.divider {
  height: 1px;
  background: var(--cream-dark);
  margin: 16px 0;
}

footer {
  text-align: center;
  font-size: 11px;
  color: var(--text-light);
  margin-top: 8px;
  padding-bottom: 4px;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">🌿 Plant Care</div>
  <div class="header-title">My Plants</div>
  <div class="header-sub">Bremen · 14 plants</div>
</div>

<div class="body">

  <!-- Weather -->
  <div class="weather-card">
    <div class="weather-top">
      <div>
        <div class="weather-desc" id="wdesc">Loading...</div>
        <div class="weather-time" id="wtime"></div>
      </div>
      <button class="refresh-btn" id="refreshBtn" onclick="loadAll()" title="Refresh">↻</button>
    </div>
    <div class="metrics" id="metrics">
      <div class="metric"><div class="metric-val">—</div><div class="metric-lbl">Temp</div></div>
    </div>
    <div class="divider"></div>
    <div class="section-label">3-day forecast</div>
    <div class="forecast-row" id="forecast"><div class="loading">Loading...</div></div>
  </div>

  <!-- Alerts -->
  <div class="section-label">Plant alerts today</div>
  <div class="alerts-wrap" id="alerts"><div class="loading">Checking conditions...</div></div>

  <!-- Plants -->
  <div class="section-label">Your plants</div>
  <div class="plant-grid" id="plantgrid"></div>

  <footer>Weather: Open-Meteo · Bremen 53.08°N 8.80°E</footer>
</div>

<script>
const WMO = {0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Foggy',48:'Icy fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snowfall',75:'Heavy snow',80:'Showers',81:'Showers',82:'Heavy showers',95:'Thunderstorm',96:'Thunderstorm + hail',99:'Thunderstorm + hail'};
const WIC = {0:'☀️',1:'🌤',2:'⛅️',3:'☁️',45:'🌫',48:'🌫',51:'🌦',53:'🌧',55:'🌧',61:'🌦',63:'🌧',65:'🌧',71:'🌨',73:'❄️',75:'❄️',80:'🌧',81:'🌧',82:'⛈',95:'⛈',96:'⛈',99:'⛈'};
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

const plants = [
  {name:'Japanese Maple',      loc:'Balcony',        badge:'balcony',  sun:true,  frost:true,  minT:-15, maxT:35, wind:true },
  {name:'Strawberry',          loc:'Balcony',        badge:'balcony',  sun:true,  frost:false, minT:-5,  maxT:35, wind:false},
  {name:'Cherry Tomato',       loc:'Balcony',        badge:'balcony',  sun:true,  frost:true,  minT:10,  maxT:35, wind:true },
  {name:'Ground Ivy',          loc:'Living room',    badge:'living',   sun:false, frost:false, minT:-10, maxT:35, wind:false},
  {name:'Bird of Paradise',    loc:'Office',         badge:'office',   sun:true,  frost:true,  minT:10,  maxT:38, wind:false},
  {name:'Monstera',            loc:'Living room',    badge:'living',   sun:false, frost:true,  minT:15,  maxT:30, wind:false},
  {name:'Fern',                loc:'Bathroom',       badge:'bathroom', sun:false, frost:true,  minT:15,  maxT:24, wind:false},
  {name:'Snake Plant',         loc:'Bathroom',       badge:'bathroom', sun:false, frost:true,  minT:10,  maxT:30, wind:false},
  {name:'Pothos',              loc:'Bathroom',       badge:'bathroom', sun:false, frost:true,  minT:10,  maxT:30, wind:false},
  {name:'Calla Lily',          loc:'Living room',    badge:'living',   sun:false, frost:true,  minT:10,  maxT:28, wind:false},
  {name:'Parlour Palm',        loc:'Office',         badge:'office',   sun:false, frost:true,  minT:16,  maxT:27, wind:false},
  {name:'Basil',               loc:'Kitchen',        badge:'kitchen',  sun:true,  frost:true,  minT:18,  maxT:32, wind:true },
  {name:'Fuchsia',             loc:'Living room',    badge:'living',   sun:false, frost:true,  minT:5,   maxT:22, wind:false},
  {name:'English Ivy',         loc:'Kitchen',        badge:'kitchen',  sun:false, frost:false, minT:5,   maxT:25, wind:false},
];

function getAlerts(w) {
  const {temp, feels, wind, rain, humidity} = w;
  const m = new Date().getMonth() + 1;
  const a = [];
  const balcony = plants.filter(p => p.badge === 'balcony').map(p => p.name);
  const frostSens = plants.filter(p => p.frost && p.badge === 'balcony').map(p => p.name);

  if (feels <= 2 && m >= 3 && m <= 5)
    a.push({t:'danger', i:'❄️', msg:`Late frost risk! Cover your Japanese Maple with fleece and bring Cherry Tomato & Basil inside tonight.`, pl:frostSens.join(', ')});
  else if (feels <= 2)
    a.push({t:'danger', i:'❄️', msg:`Near freezing (feels ${Math.round(feels)}°C). Bring frost-sensitive balcony plants indoors.`, pl:frostSens.join(', ')});
  else if (temp <= 5 && m >= 9)
    a.push({t:'warn', i:'🌡', msg:`Cold snap — Bird of Paradise and Fuchsia should come indoors if still on the balcony.`, pl:'Bird of Paradise, Fuchsia'});

  if (temp > 28)
    a.push({t:'warn', i:'☀️', msg:`Hot day (${Math.round(temp)}°C) — water balcony plants morning and evening. Move Fuchsia to shade.`, pl:balcony.join(', ')});

  if (wind > 35)
    a.push({t:'warn', i:'💨', msg:`Strong winds (${Math.round(wind)} km/h) — shelter Japanese Maple and Cherry Tomato. Protect Basil.`, pl:'Japanese Maple, Cherry Tomato, Basil'});
  else if (wind > 22)
    a.push({t:'info', i:'💨', msg:`Breezy today (${Math.round(wind)} km/h) — keep an eye on the Japanese Maple's leaves.`, pl:'Japanese Maple'});

  if (rain > 5)
    a.push({t:'ok', i:'🌧', msg:`Good rain today (${rain.toFixed(1)} mm) — balcony plants are covered. Empty saucers when rain stops.`, pl:balcony.join(', ')});
  else if (rain === 0 && humidity < 40)
    a.push({t:'warn', i:'💧', msg:`Very dry — water all balcony plants today and check bathroom plants too.`, pl:'All balcony plants, Fern, Pothos'});
  else if (rain === 0 && humidity < 55)
    a.push({t:'info', i:'💧', msg:`No rain — check balcony soil and water if top 2 cm feels dry.`, pl:'Japanese Maple, Strawberry, Cherry Tomato'});

  if (humidity > 80)
    a.push({t:'ok', i:'🌿', msg:`High humidity today — Fern, Pothos and Monstera will love it. No need to mist.`, pl:'Fern, Pothos, Monstera'});

  if (temp >= 15 && temp <= 25 && rain < 2 && wind < 20 && m >= 4 && m <= 9)
    a.push({t:'ok', i:'🌱', msg:`Perfect growing weather! Great day to check for new growth or fertilize if due.`, pl:'All plants'});

  if (a.length === 0)
    a.push({t:'ok', i:'✓', msg:`All conditions normal — no special action needed today.`, pl:'All plants'});

  return a;
}

async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  try {
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=53.0793&longitude=8.8017&current=temperature_2m,apparent_temperature,relative_humidity_2m,precipitation,wind_speed_10m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum&wind_speed_unit=kmh&timezone=Europe/Berlin&forecast_days=4');
    const d = await r.json();
    const c = d.current;

    document.getElementById('wdesc').textContent = WMO[c.weather_code] || 'Mixed';
    document.getElementById('wtime').textContent = 'Updated ' + new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});

    document.getElementById('metrics').innerHTML = [
      {v: Math.round(c.temperature_2m) + '°', l: 'Temp'},
      {v: Math.round(c.apparent_temperature) + '°', l: 'Feels'},
      {v: Math.round(c.relative_humidity_2m) + '%', l: 'Humid'},
      {v: c.precipitation.toFixed(1) + 'mm', l: 'Rain'},
      {v: Math.round(c.wind_speed_10m) + 'km/h', l: 'Wind'},
    ].map(m => `<div class="metric"><div class="metric-val">${m.v}</div><div class="metric-lbl">${m.l}</div></div>`).join('');

    const fc = d.daily;
    document.getElementById('forecast').innerHTML = fc.time.slice(1,4).map((t, i) => {
      const day = new Date(t);
      const code = fc.weather_code[i+1];
      return `<div class="forecast-day">
        <div class="fc-day">${DAYS[day.getDay()]}</div>
        <div class="fc-icon">${WIC[code] || '🌤'}</div>
        <div class="fc-temp">${Math.round(fc.temperature_2m_max[i+1])}° / ${Math.round(fc.temperature_2m_min[i+1])}°</div>
        <div class="fc-rain">${fc.precipitation_sum[i+1].toFixed(1)} mm</div>
      </div>`;
    }).join('');

    const w = {temp: c.temperature_2m, feels: c.apparent_temperature, humidity: c.relative_humidity_2m, rain: c.precipitation, wind: c.wind_speed_10m};
    document.getElementById('alerts').innerHTML = getAlerts(w).map((a, i) => `
      <div class="alert alert-${a.t}" style="animation-delay:${i*0.06}s">
        <span class="alert-icon">${a.i}</span>
        <div>
          <div class="alert-msg">${a.msg}</div>
          <div class="alert-plants">${a.pl}</div>
        </div>
      </div>`).join('');

  } catch(e) {
    document.getElementById('wdesc').textContent = 'Error';
    document.getElementById('alerts').innerHTML = `<div class="error-box">Could not load weather. Check your connection and tap ↻ to retry.</div>`;
  }

  btn.classList.remove('spinning');
}

// Render plant grid
document.getElementById('plantgrid').innerHTML = plants.map(p => `
  <div class="plant-card">
    <div class="plant-name">${p.name}</div>
    <div class="plant-loc">${p.loc}</div>
    <span class="plant-badge badge-${p.badge}">${p.loc}</span>
  </div>`).join('');

loadAll();
</script>
</body>
</html>
